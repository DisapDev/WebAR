<!doctype html>
<html lang="en">
<head>
  <title>AR Hit-Test Inspector</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

  <style>
    /* --- CORE VARIABLES & RESET --- */
    :root {
      --primary: #00D2FF;
      --bg-dark: rgba(20, 20, 20, 0.9);
      --bg-darker: #111;
      --border: #444;
      --text: #eee;
      --text-dim: #aaa;
      --radius: 12px;
      --spacing: 16px;
    }
    
    body { 
      margin: 0; overflow: hidden; 
      font-family: "Google Sans Flex", sans-serif; 
      background: black; 
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* --- DOM OVERLAY CONTAINER --- */
    #dom-overlay { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      pointer-events: none; /* Let touches pass to canvas by default */
      display: flex; flex-direction: column;
    }
    /* Re-enable pointer events for UI elements */
    #dom-overlay > * { pointer-events: auto; }
    
    /* --- HEADER / TOP BAR --- */
    #top-bar {
      position: absolute; top: 0; left: 0; width: 100%;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--spacing);
      box-sizing: border-box;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      z-index: 100;
      pointer-events: none; /* Let clicks pass through empty space */
    }
    #top-bar > * { pointer-events: auto; }

    #back-btn {
      font-family: "Google Sans Flex", sans-serif;
      background: rgba(20,20,20,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      color: white; text-decoration: none;
      padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }
    #sidebar-toggle {
      font-family: "Google Sans Flex", sans-serif;
      background: rgba(20,20,20,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      color: white; width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
    }
    /* Settings button matches sidebar toggle */
    #settings-toggle {
      font-family: "Google Sans Flex", sans-serif;
      background: rgba(20,20,20,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      color: white; width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; margin-left: 8px;
    }
    .settings-panel {
      position: absolute; top: 60px; left: 20px; z-index: 110;
      background: rgba(20,20,20,0.95); border: 1px solid #444; border-radius: 8px;
      padding: 10px; color: #ddd; min-width: 220px; display: none; box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }
    .settings-panel.active { display: block; }
    .settings-header { font-size: 13px; margin-bottom: 8px; }
    .settings-row { margin-bottom: 10px; display:flex; flex-direction:column; gap:6px; }
    .setting-label { color: #aaa; font-size: 12px; text-transform: uppercase; }
    .settings-panel label { font-size: 13px; color: #ddd; }

    /* Phase notice */
    .phase-notice {
      position: fixed; left: 50%; top: calc(env(safe-area-inset-top, 0px) + 12px); transform: translate(-50%, -10px);
      background: rgba(10,10,10,0.95); color: white; font-size: 14px; padding: 10px 18px; border-radius: 10px;
      z-index: 9999; box-shadow: 0 8px 30px rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease;
      text-align: center; min-width: 220px; max-width: 75%;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .phase-notice .phase-name { font-weight: 600; margin-bottom: 6px; }
    .phase-notice .phase-value { font-size: 13px; color: #e6eef6; opacity: 0.95; }
    .phase-notice.show { opacity: 1; transform: translate(-50%, 0); }
    .phase-notice.hiding { opacity: 0; transform: translate(-50%, -6px); }

    /* --- HIERARCHY SIDEBAR --- */
    #sidebar {
      position: absolute; top: 0; left: 0; height: 100%;
      width: 280px;
      background: var(--bg-dark);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(10px);
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      z-index: 200;
      display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }
    
    /* Sidebar Header */
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-title { font-weight: 600; font-size: 16px; }
    #sidebar-close { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }

    /* Phasing Control (moved to bottom) */
    .phase-pill {
      padding: 8px 14px; border-radius: 16px;
      display: flex; align-items: center; gap: 10px;
      box-sizing: border-box;
    }
    .phase-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .phase-count { font-size: 11px; color: var(--text-dim); min-width:34px; text-align:right; margin-left: 8px; }
    #phase-slider { width: 120px; cursor: pointer; accent-color: var(--primary); height: 4px; }

    /* Tree Container */
    #tree-container { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    
    /* Tree Items */
    .tree-item { 
      padding: 10px 20px; cursor: pointer; font-size: 14px; 
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }
    .tree-item:hover { background: rgba(255,255,255,0.05); }
    .tree-item.selected { background: rgba(0, 210, 255, 0.15); border-left: 3px solid var(--primary); }
    .tree-icon { color: var(--text-dim); font-size: 16px; }
    
    /* --- BOTTOM CONTROLS (Floating) --- */
    #bottom-controls {
      position: absolute; bottom: 30px; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 15px;
      pointer-events: none; z-index: 90;
    }
    #bottom-controls > * { pointer-events: auto; }

    /* Mode Switcher (Place vs Select) */
    .mode-switch {
      display: block;
      background: rgba(20,20,20,0.85);
      padding: 8px 8px;
      border-radius: 36px;
      border: 1px solid var(--border);
    }
    .mode-pill { display:flex; gap:10px; justify-content:center; align-items:center; }
    .mode-btn {
      font-family: "Google Sans Flex", sans-serif;
      background: rgba(20,20,20,0.85);
      color: white;
      border: 1px solid rgba(255,255,255,0.04);
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: 400;
      cursor: pointer;
    }
    .mode-btn.active {
      background: linear-gradient(180deg, var(--primary), #00c0ff);
      color: black;
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.12);
    }
    
    /* Controls Row: place scale + phase side-by-side (more compact) */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 8px;
      border-radius: 16px;
      background: rgba(20,20,20,0.85);
      border: 1px solid var(--border);
      max-width: 720px;
    }
    /* Use same outer margin for child pills so left/right feel balanced */
    .controls-row .scale-container { margin: 6px 0; }
    .controls-row .phase-pill { margin: 6px 0; }

    /* Scale Slider Container (compact) */
    .scale-container {
      padding: 8px 14px; border-radius: 16px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .scale-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
    #scale-slider { width: 120px; max-width: 100%; accent-color: var(--primary); height: 4px; }

    /* smaller slider appearance */
    input[type="range"]::-webkit-slider-thumb { width: 14px; height: 14px; margin-top: -5px; }
    input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; }
    input[type="range"] { height: 6px; }

    /* Responsive: stack controls on narrow screens only */
    @media (max-width: 640px) {
      /* Give the bottom container a little horizontal padding so children don't touch edges */
      #bottom-controls { padding: 0 14px; }

      /* Stack the controls vertically while keeping them in the same container */
      .controls-row {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        width: 100%;
        max-width: 404px;
        padding: 8px;
      }

      /* Make each pill fill the available width */
      .controls-row .scale-container,
      .controls-row .phase-pill {
        width: 100%;
        box-sizing: border-box;
        margin: 6px 0;
      }

      /* Give the scale row space between label and slider */
      .scale-container { justify-content: space-between; }
      .scale-container .scale-label { margin-right: 12px; }
      #scale-slider { width: 100%; max-width: none; }

      /* Make phase slider expand to full width in stacked layout */
      .phase-pill { justify-content: space-between; gap: 12px; }
      #phase-slider { width: 100%; }
    }

    /* Select mode cursor (temporary on-screen pointer) -- VISUAL CURSOR REMOVED (kept for legacy/assistive reasons) */
    .select-cursor {
      position: fixed;
      width: 16px; height: 16px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.06);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%) scale(1);
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      display: none !important; z-index: 500; pointer-events: none; /* force hidden */
    }
    .select-cursor.hit {
      background: var(--primary);
      transform: translate(-50%, -50%) scale(1.25);
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.25);
    }

    /* --- DATA PANEL (Bottom Sheet style for Mobile) --- */
    #data-panel {
      position: absolute; bottom: 0; left: 0; width: 100%;
      max-height: 40vh; /* Takes up to 40% of screen height */
      background: var(--bg-dark);
      border-top-left-radius: 20px; border-top-right-radius: 20px;
      backdrop-filter: blur(15px); border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateY(110%); /* Hidden by default */
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 300;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    }
    #data-panel.active { transform: translateY(0); }

    /* Drag Handle (Visual cue) */
    .panel-handle {
      width: 40px; height: 4px; background: #555; border-radius: 2px;
      margin: 12px auto; flex-shrink: 0;
    }
    
    .panel-header {
      padding: 0 20px 10px 20px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-title { font-size: 18px; font-weight: 600; color: white; margin: 0; }
    .panel-close { background: none; border: none; color: var(--text-dim); font-size: 24px; padding: 10px; cursor: pointer; }

    /* Scrollable Content Area */
    .panel-content {
      padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    
    .data-row { margin-bottom: 12px; }
    .data-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
    .data-value { font-size: 14px; color: white; line-height: 1.4; }

    /* --- START SCREEN --- */
    #start-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #222, #000);
      z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: white;
    }
    #start-screen h1 { margin-bottom: 10px; font-size: 24px; }
    #start-screen p { color: #aaa; margin-bottom: 30px; font-size: 14px; max-width: 80%; line-height: 1.5; }
    /* start button styling (copied from marker.html) */
    #start-ar-btn {
      margin-top: 24px;
      padding: 12px 36px;
      font-size: 18px;
      font-weight: 600;
      background: var(--primary);
      color: black;
      border: none;
      border-radius: 24px;
      cursor: pointer;
    }

    /* Loading Overlay (shows while models are loading) */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      background: rgba(0,0,0,0.65);
      color: white;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      text-align: center;
    }
    #loading-overlay.hidden { display: none; }
    #loading-overlay .loading-text { font-size: 15px; color: #e6eef6; opacity: 0.95; }
    #loading-overlay .spinner {
      width: 48px; height: 48px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.12);
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* AR Button Injection Styling Override */
    #ar-button { 
      background: var(--primary) !important; color: black !important;
      padding: 12px 30px !important; border-radius: 30px !important; border: none !important;
      font-size: 16px !important; opacity: 1 !important;
      font-family: "Google Sans Flex", sans-serif !important;
      width: auto !important; height: auto !important;
      font-weight: 600 !important;
    }

    /* --- DESKTOP / LANDSCAPE TWEAKS --- */
    @media (min-width: 768px) {
      /* Sidebar pushes content or overlays nicely */
      #sidebar { width: 320px; border-right: 1px solid var(--border); }
      
      /* Data Panel becomes floating card on right */
      #data-panel {
        bottom: 20px; left: auto; right: 20px; width: 320px;
        border-radius: 16px; border: 1px solid var(--border);
        transform: translateX(120%); /* Slide out to right */
        max-height: 60vh;
      }
      #data-panel.active { transform: translateX(0); }
      .panel-handle { display: none; }
    }
  </style>

  <!-- Import Map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>AR Inspection</h1>
    <p>View the phasing timeline and inspect BIM data directly on site.</p>
    <!-- manual start button for MindAR -->
    <button id="start-ar-btn" class="start-btn">START AR</button>
    <a href="model-view.html" style="color: #ffffff; font-size: 12px; margin-top: 30px; text-decoration: none;">Exit to Inspector</a>
  </div>

  <!-- UI OVERLAY -->
  <div id="dom-overlay">
    
    <!-- TOP BAR -->
    <div id="top-bar">
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="sidebar-toggle" class="top-btn">☰</button>
        <button id="settings-toggle" class="top-btn">⚙</button>
      </div>
      <a id="back-btn" class="top-btn" href="model-view.html">
        <span style="font-size:18px">←</span>
      </a>
    </div>

    <!-- Phase Notice (temporary top-centered floating notification) -->
    <div id="phase-notice" class="phase-notice" aria-hidden="true"></div>

    <!-- HIERARCHY SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Project Hierarchy</span>
        <button id="sidebar-close">✕</button>
      </div>
      


      <div id="tree-container">
        <div style="padding:20px; color:#666; font-size:13px; text-align:center;">Loading Project...</div>
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel" aria-hidden="true">
      <div class="settings-header"><strong>Settings</strong></div>
      <div class="settings-row">
        <div class="setting-label">Selection Outline</div>
        <label><input type="radio" name="outline-mode" value="edges"> Wireframe</label>
        <label><input type="radio" name="outline-mode" value="box"> Box</label>
        <label><input type="radio" name="outline-mode" value="none"> None</label>
      </div>
      <div class="settings-row">
        <div class="setting-label">Hitbox Size</div>
        <label><input type="radio" name="hitbox-size" value="normal"> Normal</label>
        <label><input type="radio" name="hitbox-size" value="large"> Larger</label>
      </div>
      <div class="settings-row">
        <div class="setting-label">Display</div>
        <label><input type="checkbox" id="setting-fullscreen-gesture"> Enter fullscreen on gesture</label>
      </div>
    </div>

    <!-- DATA PANEL (Bottom Sheet) -->
    <div id="data-panel">
      <div class="panel-handle"></div>
      <div class="panel-header">
        <h3 class="panel-title" id="data-title">Selection</h3>
        <button class="panel-close" id="close-data">✕</button>
      </div>
      <div class="panel-content" id="data-content">
        <!-- Content injected here -->
      </div>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div id="bottom-controls">


      <!-- Compact Controls Row: Scale + Phase side-by-side -->
      <div class="controls-row">
        <div class="scale-container">
          <span class="scale-label">Scale</span>
          <input id="scale-slider" type="range" min="0.01" max="0.2" step="0.01" value="0.05">
        </div>

        <div class="phase-pill" aria-label="construction-phase">
          <span class="phase-title">Phase</span>
          <input id="phase-slider" type="range" min="0" max="0" value="0">
          <span id="phase-label" class="phase-count">0/0</span>
        </div>
      </div>

    </div>

    <div id="select-cursor" class="select-cursor" aria-hidden="true"></div>

    <div id="loading-overlay" class="hidden" aria-hidden="true">
      <div class="spinner" role="status" aria-hidden="true"></div>
      <div class="loading-text">Loading models…</div>
    </div>
  </div>

    <script type="module">
    // Entire AR/interaction script copied and simplified from marker.html
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js';
    import { getModelID, getPaths, loadProjectManifest } from '../js/project-loader.js';

    // --- 1. CONFIG & INIT ---
    const modelID = getModelID();
    if (!modelID) { alert("No Model ID!"); window.location.href = "../index.html"; }
    document.getElementById('back-btn').href = `model-view.html?id=${modelID}`;
    const paths = getPaths(modelID);

    const container = document.createElement('div');
    document.body.appendChild(container);

    const mindarThree = new MindARThree({
      container,
      imageTargetSrc: `${paths.base}/marker.mind`,
      maxTrack: 1
    });
    const { renderer, scene, camera } = mindarThree;

    // lights
    const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
    light.position.set(0.5, 1, 0.25);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(0, 10, 0);
    scene.add(dirLight);

    // start screen
    const startScreen = document.getElementById('start-screen');
    async function startAR() {
      try {
        await mindarThree.start();
        console.log('MindAR started');
      } catch (e) {
        console.error('AR start failed', e);
        alert('AR start failed: ' + (e.message || e));
      }
      if (startScreen) startScreen.style.display = 'none';
    }
    const startBtn = document.getElementById('start-ar-btn');
    if (startBtn) startBtn.addEventListener('click', startAR);
    // also kick off on any screen tap (helps when button is missing)
    container.addEventListener('click', () => {
      if (startScreen && startScreen.style.display !== 'none') startAR();
    });

    // --- 3. SCENE OBJECTS ---
    const modelGroup = new THREE.Group();
    let modelScale = 0.05;

    const loader = new GLTFLoader();
    let phaseEntries = [];
    let phaseManifestData = null;
    let dataMapData = null;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let outlineObject = null;

    function loadGLB(url) {
      return new Promise((resolve, reject) => {
      loader.load(url, gltf => resolve(gltf), undefined, err => reject(err));
      });
    }

    const _loadingOverlayEl = document.getElementById('loading-overlay');
    function setLoadingOverlay(show, text) {
      if (!_loadingOverlayEl) return;
      _loadingOverlayEl.classList.toggle('hidden', !show);
      if (text !== undefined) {
        const t = _loadingOverlayEl.querySelector('.loading-text');
        if (t) t.textContent = String(text);
      }
    }

    setLoadingOverlay(true, 'Loading project manifest...');
    loadProjectManifest(modelID).then(async (manifest) => {
      if (!manifest) { setLoadingOverlay(false); return; }
      document.getElementById('tree-container').innerHTML = ''; 
      phaseManifestData = manifest;

      try {
      const res = await fetch(paths.dataMap);
      if (res.ok) dataMapData = await res.json();
      } catch(e) { console.warn("No data map found"); }

      const sortedPhases = Object.keys(manifest).sort((a, b) => {
      const numA = parseInt(a.match(/\d+/)[0] || 0);
      const numB = parseInt(b.match(/\d+/)[0] || 0);
      return numA - numB;
      });

      phaseEntries = [];
      for (let i = 0; i < sortedPhases.length; i++) {
      const phaseName = sortedPhases[i];
      const url = paths.getGLBPath(phaseName);
      try {
        const gltf = await loadGLB(url);
        const model = gltf.scene;
        model.scale.set(modelScale, modelScale, modelScale);
        modelGroup.add(model);
        phaseEntries.push({ name: phaseName, model });
        addHierarchyItem(phaseName, model);
      } catch (e) { console.error("Load failed", url, e); }
      }
      setupSlider();
      setLoadingOverlay(false);
    }).catch((err) => {
      console.error('Project load failed', err);
      setLoadingOverlay(false);
    });

    // --- 5. UI LOGIC ---
    const sidebar = document.getElementById('sidebar');
    const toggleSidebar = () => sidebar.classList.toggle('open');
    document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
    document.getElementById('sidebar-close').addEventListener('click', () => sidebar.classList.remove('open'));

    const settingsToggle = document.getElementById('settings-toggle');
    const settingsPanel = document.getElementById('settings-panel');
    let selectionOutlineMode = localStorage.getItem('outlineMode') || 'edges';
    let hitboxSize = localStorage.getItem('hitboxSize') || 'normal';
    let hitboxFactor = (hitboxSize === 'large') ? 1.8 : 1.0;
    let selectedMesh = null;
    let lastPhaseNoticeIdx = -1;
    const outlineInputs = document.querySelectorAll('input[name="outline-mode"]');
    const hitboxInputs = document.querySelectorAll('input[name="hitbox-size"]');
    outlineInputs.forEach(i => { i.checked = (i.value === selectionOutlineMode); i.addEventListener('change', (e) => {
      if (!e.target.checked) return;
      selectionOutlineMode = e.target.value;
      localStorage.setItem('outlineMode', selectionOutlineMode);
      if (selectedMesh) { clearOutline(); addOutline(selectedMesh); }
      clearHover();
    }); });
    hitboxInputs.forEach(i => { i.checked = (i.value === hitboxSize); i.addEventListener('change', (e) => {
      if (!e.target.checked) return;
      hitboxSize = e.target.value;
      hitboxFactor = (hitboxSize === 'large') ? 1.8 : 1.0;
      localStorage.setItem('hitboxSize', hitboxSize);
    }); });
    let fullscreenOnGesture = localStorage.getItem('fullscreenOnGesture') === '1';
    const fsCheckbox = document.getElementById('setting-fullscreen-gesture');
    if (fsCheckbox) {
      fsCheckbox.checked = fullscreenOnGesture;
      fsCheckbox.addEventListener('change', (e) => {
        fullscreenOnGesture = !!e.target.checked;
        localStorage.setItem('fullscreenOnGesture', fullscreenOnGesture ? '1' : '0');
      });
    }
    function tryEnterFullscreen() {
      if (!fullscreenOnGesture) return;
      if (document.fullscreenElement) return;
      const el = document.documentElement;
      const request = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (!request) return;
      try {
        const p = request.call(el);
        if (p && typeof p.then === 'function') p.catch(err => console.warn('Fullscreen request failed:', err));
      } catch (err) {
        try { request.call(el); } catch (e) { console.warn('Fullscreen request failed:', e); }
      }
    }
    if (settingsToggle) {
      settingsToggle.addEventListener('click', (e) => {
        if (settingsPanel) settingsPanel.classList.toggle('active');
        e.stopPropagation();
      });
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#settings-panel') && !e.target.closest('#settings-toggle')) {
        if (settingsPanel) settingsPanel.classList.remove('active');
      }
    });
    const dataPanel = document.getElementById('data-panel');
    const closeData = () => { dataPanel.classList.remove('active'); clearOutline(); selectedMesh = null; };
    document.getElementById('close-data').addEventListener('click', closeData);

    const scaleSlider = document.getElementById('scale-slider');
    scaleSlider.addEventListener('input', (e) => {
      modelScale = parseFloat(e.target.value);
      modelGroup.children.forEach(child => { child.scale.set(modelScale, modelScale, modelScale); });
    });

    function setupSlider() {
      const slider = document.getElementById('phase-slider');
      const label = document.getElementById('phase-label');
      slider.max = Math.max(0, phaseEntries.length - 1);
      slider.value = phaseEntries.length - 1;
      label.textContent = `${phaseEntries.length}/${phaseEntries.length}`;
      slider.addEventListener('input', (e) => {
        const idx = parseInt(e.target.value);
        phaseEntries.forEach((entry, i) => { entry.model.visible = i <= idx; });
        label.textContent = `${idx + 1}/${phaseEntries.length}`;
        if (idx !== lastPhaseNoticeIdx) { showPhaseNotice(idx); lastPhaseNoticeIdx = idx; }
      });
      slider.addEventListener('change', (e) => {
        const idx = parseInt(e.target.value);
        if (idx !== lastPhaseNoticeIdx) { showPhaseNotice(idx); lastPhaseNoticeIdx = idx; }
      });
      phaseEntries.forEach((entry, i) => entry.model.visible = true);
    }

    function addHierarchyItem(name, object) {
      const container = document.getElementById('tree-container');
      const div = document.createElement('div');
      div.className = 'tree-item';
      div.innerHTML = `<span class="tree-icon">📁</span> ${name}`;
      div.addEventListener('click', () => { selectObject(object, name); sidebar.classList.remove('open'); const idx = phaseEntries.findIndex(p => p.name === name); if (idx >= 0) showPhaseNotice(idx, true); });
      container.appendChild(div);
      object.traverse((child) => {
        if (child.isMesh) {
          const childDiv = document.createElement('div');
          childDiv.className = 'tree-item';
          childDiv.style.paddingLeft = '40px';
          const shortName = child.name.length > 25 ? child.name.substring(0, 22) + '...' : child.name;
          childDiv.innerHTML = `<span class="tree-icon">🔷</span> ${shortName}`;
          childDiv.addEventListener('click', (e) => { e.stopPropagation(); selectObject(child, child.name); sidebar.classList.remove('open'); });
          container.appendChild(childDiv);
        }
      });
    }

    const controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);
    function onSelect() {
      // always selection (no place mode)
      const tempMatrix = new THREE.Matrix4();
      tempMatrix.identity().extractRotation(controller.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
      const intersects = raycaster.intersectObjects(modelGroup.children, true);
      let picked = null;
      if (intersects.length > 0) {
        const hit = intersects.find(x => x.object.isMesh);
        if (hit) picked = hit.object;
      }
      if (!picked && hitboxFactor > 1.0) picked = broadRaycastPick(raycaster, hitboxFactor);
      if (picked) { selectObject(picked, picked.name); sidebar.classList.remove('open'); } else { closeData(); }
    }
    container.addEventListener('click', (event) => {
      // ignore UI
      if (event.target.closest('#sidebar') || event.target.closest('#data-panel') || event.target.closest('#bottom-controls') || event.target.closest('#top-bar')) return;
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(modelGroup.children, true);
      let picked = null;
      if (intersects.length > 0) {
        const hit = intersects.find(x => x.object.isMesh);
        if (hit) picked = hit.object;
      }
      if (!picked && hitboxFactor > 1.0) picked = broadRaycastPick(raycaster, hitboxFactor);
      if (picked) { selectObject(picked, picked.name); sidebar.classList.remove('open'); } else { closeData(); }
    });

    let hoveredObject = null;
    let hoverOutline = null;
    function clearHover() {
      if (hoverOutline) { if (hoverOutline.parent) hoverOutline.parent.remove(hoverOutline); hoverOutline = null; }
      hoveredObject = null;
      const cursorEl = document.getElementById('select-cursor');
      if (cursorEl) cursorEl.classList.remove('hit');
    }
    container.addEventListener('pointermove', (event) => {
      if (event.target.closest('#sidebar') || event.target.closest('#data-panel') || event.target.closest('#bottom-controls') || event.target.closest('#top-bar')) { clearHover(); return; }
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(modelGroup.children, true);
      if (intersects.length > 0) {
        const hit = intersects.find(x => x.object.isMesh);
        if (hit) {
          if (hoveredObject !== hit.object) {
            clearHover();
            hoveredObject = hit.object;
            if (hoveredObject.geometry) {
              if (selectionOutlineMode === 'box') {
                const box = new THREE.BoxHelper(hoveredObject, 0x0099ff);
                box.material.depthTest = false;
                box.renderOrder = 998;
                scene.add(box);
                hoverOutline = box;
              } else if (selectionOutlineMode === 'edges') {
                const edges = new THREE.EdgesGeometry(hoveredObject.geometry, 15);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x0099ff, depthTest: false }));
                line.renderOrder = 998;
                hoveredObject.add(line);
                hoverOutline = line;
              } else { hoverOutline = null; }
            }
          }
          return;
        }
      }
      clearHover();
    });
    document.addEventListener('pointerdown', (e) => {
      if (e.target.closest('#sidebar') || e.target.closest('#data-panel') || e.target.closest('#bottom-controls') || e.target.closest('#top-bar')) {
        clearHover();
      }
    });

    function findKeyRecursive(obj, pattern) {
      if (!obj || typeof obj !== 'object') return null;
      for (const key of Object.keys(obj)) {
        try { if (pattern.test(key)) return obj[key]; } catch (e) {}
        const val = obj[key];
        if (val && typeof val === 'object') {
          const found = findKeyRecursive(val, pattern);
          if (found != null) return found;
        }
      }
      return null;
    }
    function getPhaseDate(idx) {
      if (!phaseEntries || !phaseEntries[idx]) return null;
      const name = phaseEntries[idx].name;
      if (!phaseManifestData) return null;
      const data = phaseManifestData[name];
      if (data == null) return null;
      if (typeof data === 'string' || typeof data === 'number') {
        try {
          const d = new Date(data);
          if (!isNaN(d)) return d.toLocaleString();
        } catch (e) {}
        return String(data);
      }
      const candidates = ['date','phaseDate','phase_date','startDate','start_date','start','timestamp'];
      for (const key of candidates) {
        let val = data[key];
        if (!val && data.metadata) val = data.metadata[key];
        if (val) {
          try { const d = new Date(val); if (!isNaN(d)) return d.toLocaleString(); } catch (e) { return String(val); }
          return String(val);
        }
      }
      return null;
    }
    function getPhaseTimeLinerValue(idx) {
      if (!phaseEntries || !phaseEntries[idx]) return null;
      const name = phaseEntries[idx].name;
      if (!phaseManifestData) return null;
      const data = phaseManifestData[name];
      if (data == null) return null;
      if (typeof data === 'string' || typeof data === 'number') return data;
      const exactKey = Object.keys(data).find(k => k.toLowerCase().includes('timeliner') && k.toLowerCase().includes('task start'));
      if (exactKey) return data[exactKey];
      const pattern = /timeliner.*task.*start|task.*start.*timeliner|contained in task start/i;
      const found = findKeyRecursive(data, pattern);
      if (found != null) return found;
      const tlKey = Object.keys(data).find(k => k.toLowerCase().includes('timeliner'));
      if (tlKey) return data[tlKey];
      if (data.metadata) {
        const metaFound = findKeyRecursive(data.metadata, pattern);
        if (metaFound != null) return metaFound;
      }
      return null;
    }
    function showPhaseNotice(idx, force = false) {
      const notice = document.getElementById('phase-notice');
      if (!notice) return;
      if (!force && idx === lastPhaseNoticeIdx) return;
      const name = phaseEntries[idx] ? phaseEntries[idx].name : `Phase ${idx+1}`;
      let phaseLabel = null;
      const m = (phaseEntries[idx] && phaseEntries[idx].name) ? phaseEntries[idx].name.match(/(\d+)/) : null;
      if (m) phaseLabel = `Phase ${m[1]}`; else phaseLabel = `Phase ${idx+1}`;
      const timeVal = getPhaseTimeLinerValue(idx);
      let displayDate = null;
      if (timeVal) {
        try { const d = new Date(timeVal); if (!isNaN(d)) displayDate = d.toLocaleString(); else displayDate = String(timeVal); } catch (e) { displayDate = String(timeVal); }
      } else {
        displayDate = getPhaseDate(idx);
      }
      notice.innerHTML = `<div class="phase-name">${phaseLabel}</div><div class="phase-value">${displayDate || ''}</div>`;
      notice.classList.remove('hiding'); notice.classList.add('show');
      clearTimeout(notice._hideTimer);
      notice._hideTimer = setTimeout(() => {
        notice.classList.remove('show'); notice.classList.add('hiding');
        clearTimeout(notice._clearTimer);
        notice._clearTimer = setTimeout(() => { notice.classList.remove('hiding'); }, 350);
      }, 3000);
      lastPhaseNoticeIdx = idx;
    }
    function broadRaycastPick(raycaster, factor = 1.0) {
      let best = null; let bestT = Infinity; const tmpV = new THREE.Vector3();
      modelGroup.children.forEach(child => {
        child.traverse((mesh) => {
          if (!mesh.isMesh || !mesh.geometry) return;
          if (!mesh.geometry.boundingSphere) mesh.geometry.computeBoundingSphere();
          tmpV.copy(mesh.geometry.boundingSphere.center);
          mesh.localToWorld(tmpV);
          const dist = raycaster.ray.distanceToPoint(tmpV);
          const maxScale = Math.max(mesh.scale.x, mesh.scale.y, mesh.scale.z);
          const radius = mesh.geometry.boundingSphere.radius * maxScale;
          if (dist <= radius * factor) {
            const originToCenter = new THREE.Vector3().subVectors(tmpV, raycaster.ray.origin);
            const t = originToCenter.dot(raycaster.ray.direction);
            if (t >= 0 && t < bestT) { bestT = t; best = mesh; }
          }
        });
      });
      return best;
    }
    function findPhaseIndexByObject(object) {
      if (!phaseEntries) return -1;
      for (let i = 0; i < phaseEntries.length; i++) {
        const root = phaseEntries[i].model;
        let found = false;
        root.traverse((child) => { if (child === object) found = true; });
        if (found) return i;
      }
      return -1;
    }
    function selectObject(object, name) {
      sidebar.classList.remove('open'); clearOutline(); selectedMesh = object; if (object.isMesh) addOutline(object);
      const pidx = findPhaseIndexByObject(object); if (pidx >= 0) showPhaseNotice(pidx, true);
      const title = document.getElementById('data-title'); const content = document.getElementById('data-content');
      title.textContent = name || object.name; dataPanel.classList.add('active');
      let html = '';
      html += `<div class="data-row"><div class="data-label">Type</div><div class="data-value">${object.isMesh ? 'Static Mesh' : 'Group/Actor'}</div></div>`;
      if (dataMapData && dataMapData[object.name]) {
         for (const [key, val] of Object.entries(dataMapData[object.name])) {
          html += `<div class="data-row"><div class="data-label">${key}</div><div class="data-value">${val}</div></div>`;
        }
      } else {
        html += `<div style="padding:10px 0; color:#888; font-style:italic;">No additional BIM data found for this element.</div>`;
      }
      content.innerHTML = html;
    }
    function addOutline(mesh) {
      if (!mesh.isMesh) return;
      if (selectionOutlineMode === 'box') {
        const box = new THREE.BoxHelper(mesh, 0x0099ff);
        box.material.depthTest = false; box.renderOrder = 999; scene.add(box); outlineObject = box;
      } else if (selectionOutlineMode === 'edges') {
        if (!mesh.geometry) return;
        const edges = new THREE.EdgesGeometry(mesh.geometry, 15);
        const outlineLineMaterial = new THREE.LineBasicMaterial({ color: 0x0099ff, fog: false, transparent: true, opacity: 1.0, depthTest: false, depthWrite: false });
        const outlineEdges = new THREE.LineSegments(edges, outlineLineMaterial);
        outlineEdges.renderOrder = 999; mesh.add(outlineEdges); outlineObject = outlineEdges;
      } else { outlineObject = null; }
    }
    function clearOutline() { if (outlineObject) { if (outlineObject.parent) outlineObject.parent.remove(outlineObject); else scene.remove(outlineObject); outlineObject = null; } }

    // --- 7. MARKER CALLBACKS & START ---
    const anchor = mindarThree.addAnchor(0);
    anchor.group.add(modelGroup);
    const startScreenEl = document.getElementById('start-screen');
    const bottomControlsEl = document.getElementById('bottom-controls');
    const selectCursorEl = document.getElementById('select-cursor');
    if (bottomControlsEl) bottomControlsEl.style.display = 'none';
    if (selectCursorEl) selectCursorEl.style.display = 'none';
    anchor.onTargetFound = () => {
      if (bottomControlsEl) bottomControlsEl.style.display = '';
      if (selectCursorEl) selectCursorEl.style.display = '';
      if (startScreenEl) startScreenEl.style.display = 'none';
    };
    anchor.onTargetLost = () => {
      if (bottomControlsEl) bottomControlsEl.style.display = 'none';
      if (selectCursorEl) selectCursorEl.style.display = 'none';
      if (startScreenEl) startScreenEl.style.display = '';
      closeData();
    };

    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
    });
    </script>
</body>
</html>
