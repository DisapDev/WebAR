<!doctype html>
<html lang="en">
<head>
  <title>AR Hit-Test Inspector</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

  <style>
    /* --- CORE VARIABLES & RESET --- */
    :root {
      --primary: #00D2FF;
      --bg-dark: rgba(20, 20, 20, 0.9);
      --bg-darker: #111;
      --border: #444;
      --text: #eee;
      --text-dim: #aaa;
      --radius: 12px;
      --spacing: 16px;
    }
    
    body { 
      margin: 0; overflow: hidden; 
      font-family: "Google Sans Flex", sans-serif; 
      background: black; 
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* --- DOM OVERLAY CONTAINER --- */
    #dom-overlay { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      pointer-events: none; /* Let touches pass to canvas by default */
      display: flex; flex-direction: column;
    }
    /* Re-enable pointer events for UI elements */
    #dom-overlay > * { pointer-events: auto; }
    
    /* --- HEADER / TOP BAR --- */
    #top-bar {
      position: absolute; top: 0; left: 0; width: 100%;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--spacing);
      box-sizing: border-box;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      z-index: 100;
      pointer-events: none; /* Let clicks pass through empty space */
    }
    #top-bar > * { pointer-events: auto; }

    #back-btn {
      background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white; text-decoration: none;
      padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }
    #sidebar-toggle {
      background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white; width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
    }

    /* --- HIERARCHY SIDEBAR --- */
    #sidebar {
      position: absolute; top: 0; left: 0; height: 100%;
      width: 280px;
      background: var(--bg-dark);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(10px);
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      z-index: 200;
      display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }
    
    /* Sidebar Header */
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-title { font-weight: 600; font-size: 16px; }
    #sidebar-close { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }

    /* Phasing Control (moved to bottom) */
    .phase-pill {
      background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px);
      padding: 6px 12px; border-radius: 20px;
      display: flex; align-items: center; gap: 10px;
      border: 1px solid var(--border);
    }
    .phase-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
    .phase-count { font-size: 12px; color: var(--text-dim); min-width:36px; text-align:right; }
    #phase-slider { width: 120px; cursor: pointer; accent-color: var(--primary); }

    /* Tree Container */
    #tree-container { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    
    /* Tree Items */
    .tree-item { 
      padding: 10px 20px; cursor: pointer; font-size: 14px; 
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }
    .tree-item:hover { background: rgba(255,255,255,0.05); }
    .tree-item.selected { background: rgba(0, 210, 255, 0.15); border-left: 3px solid var(--primary); }
    .tree-icon { color: var(--text-dim); font-size: 16px; }
    
    /* --- BOTTOM CONTROLS (Floating) --- */
    #bottom-controls {
      position: absolute; bottom: 30px; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 15px;
      pointer-events: none; z-index: 90;
    }
    #bottom-controls > * { pointer-events: auto; }

    /* Mode Switcher (Place vs Select) */
    .mode-switch {
      background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px);
      padding: 6px; border-radius: 30px;
      display: flex; gap: 5px; border: 1px solid var(--border);
    }
    .mode-btn {
      padding: 10px 20px; border-radius: 24px; border: none;
      background: transparent; color: var(--text-dim);
      font-weight: 500; font-size: 14px; cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active { background: var(--primary); color: #000; box-shadow: 0 2px 10px rgba(0, 210, 255, 0.3); }

    /* Scale Slider Container */
    .scale-container {
      background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px);
      padding: 10px 20px; border-radius: 20px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .scale-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
    #scale-slider { width: 150px; accent-color: var(--primary); }

    /* Select mode cursor (temporary on-screen pointer) */
    .select-cursor {
      position: fixed;
      width: 16px; height: 16px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.06);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transform: translate(-50%, -50%) scale(1);
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      display: none; z-index: 500; pointer-events: none;
    }
    .select-cursor.hit {
      background: var(--primary);
      transform: translate(-50%, -50%) scale(1.25);
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.25);
    }

    /* --- DATA PANEL (Bottom Sheet style for Mobile) --- */
    #data-panel {
      position: absolute; bottom: 0; left: 0; width: 100%;
      max-height: 40vh; /* Takes up to 40% of screen height */
      background: var(--bg-dark);
      border-top-left-radius: 20px; border-top-right-radius: 20px;
      backdrop-filter: blur(15px); border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateY(110%); /* Hidden by default */
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 300;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    }
    #data-panel.active { transform: translateY(0); }

    /* Drag Handle (Visual cue) */
    .panel-handle {
      width: 40px; height: 4px; background: #555; border-radius: 2px;
      margin: 12px auto; flex-shrink: 0;
    }
    
    .panel-header {
      padding: 0 20px 10px 20px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-title { font-size: 18px; font-weight: 600; color: white; margin: 0; }
    .panel-close { background: none; border: none; color: var(--text-dim); font-size: 24px; padding: 10px; cursor: pointer; }

    /* Scrollable Content Area */
    .panel-content {
      padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    
    .data-row { margin-bottom: 12px; }
    .data-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
    .data-value { font-size: 14px; color: white; line-height: 1.4; }

    /* --- START SCREEN --- */
    #start-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #222, #000);
      z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: white;
    }
    #start-screen h1 { margin-bottom: 10px; font-size: 24px; }
    #start-screen p { color: #aaa; margin-bottom: 30px; font-size: 14px; max-width: 80%; line-height: 1.5; }
    
    /* AR Button Injection Styling Override */
    #ar-button { 
      background: var(--primary) !important; color: black !important; font-weight: bold !important;
      padding: 12px 30px !important; border-radius: 30px !important; border: none !important;
      font-size: 16px !important; opacity: 1 !important;
    }

    /* --- DESKTOP / LANDSCAPE TWEAKS --- */
    @media (min-width: 768px) {
      /* Sidebar pushes content or overlays nicely */
      #sidebar { width: 320px; border-right: 1px solid var(--border); }
      
      /* Data Panel becomes floating card on right */
      #data-panel {
        bottom: 20px; left: auto; right: 20px; width: 320px;
        border-radius: 16px; border: 1px solid var(--border);
        transform: translateX(120%); /* Slide out to right */
        max-height: 60vh;
      }
      #data-panel.active { transform: translateX(0); }
      .panel-handle { display: none; }
    }
  </style>

  <!-- Import Map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>AR Inspection</h1>
    <p>View the phasing timeline and inspect BIM data directly on site.</p>
    <!-- ARButton will be injected here via JS -->
    <a href="model-view.html" style="color: #666; font-size: 12px; margin-top: 30px; text-decoration: none;">Exit to Inspector</a>
  </div>

  <!-- UI OVERLAY -->
  <div id="dom-overlay">
    
    <!-- TOP BAR -->
    <div id="top-bar">
      <button id="sidebar-toggle">☰</button>
      <a id="back-btn" href="model-view.html">
        <span style="font-size:18px">←</span> Back
      </a>
    </div>

    <!-- HIERARCHY SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Project Hierarchy</span>
        <button id="sidebar-close">✕</button>
      </div>
      


      <div id="tree-container">
        <div style="padding:20px; color:#666; font-size:13px; text-align:center;">Loading Project...</div>
      </div>
    </div>

    <!-- DATA PANEL (Bottom Sheet) -->
    <div id="data-panel">
      <div class="panel-handle"></div>
      <div class="panel-header">
        <h3 class="panel-title" id="data-title">Selection</h3>
        <button class="panel-close" id="close-data">✕</button>
      </div>
      <div class="panel-content" id="data-content">
        <!-- Content injected here -->
      </div>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div id="bottom-controls">
      
      <!-- Phase Pill (moved from sidebar) -->
      <div class="phase-pill" aria-label="construction-phase">
        <span class="phase-title">CONSTRUCTION PHASE</span>
        <input id="phase-slider" type="range" min="0" max="0" value="0">
        <span id="phase-label" class="phase-count">0/0</span>
      </div>

      <!-- Scale Slider -->
      <div class="scale-container">
        <span class="scale-label">Scale</span>
        <input id="scale-slider" type="range" min="0.01" max="0.2" step="0.01" value="0.05">
      </div>

      <!-- Mode Switcher -->
      <div class="mode-switch">
        <button class="mode-btn active" id="btn-place">✢ Place</button>
        <button class="mode-btn" id="btn-select">👆 Select</button>
      </div>

    </div>

    <div id="select-cursor" class="select-cursor" aria-hidden="true"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { ARButton } from 'three/addons/webxr/ARButton.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { getModelID, getPaths, loadProjectManifest } from '../js/project-loader.js';

    // --- 1. CONFIG & INIT ---
    const modelID = getModelID();
    if (!modelID) { alert("No Model ID!"); window.location.href = "../index.html"; }
    
    // Update Back Link
    document.getElementById('back-btn').href = `model-view.html?id=${modelID}`;

    const paths = getPaths(modelID);

    // Three.js Core
    const container = document.createElement('div');
    document.body.appendChild(container);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    container.appendChild(renderer.domElement);

    // Lights
    const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
    light.position.set(0.5, 1, 0.25);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(0, 10, 0); // Overhead light
    scene.add(dirLight);

    // --- 2. AR SETUP ---
    const overlayDiv = document.getElementById('dom-overlay');
    const startScreen = document.getElementById('start-screen');

    // Create custom AR Button inside our start screen
    const arBtn = ARButton.createButton(renderer, { 
        requiredFeatures: ['hit-test'], 
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: overlayDiv }
    });
    arBtn.id = "ar-button"; // For CSS styling
    startScreen.insertBefore(arBtn, startScreen.lastElementChild);

    // Handle Session Events
    renderer.xr.addEventListener('sessionstart', () => {
        startScreen.style.display = 'none';
    });
    renderer.xr.addEventListener('sessionend', () => {
        location.reload();
    });

    // --- 3. SCENE OBJECTS ---
    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    // Reticle (The Ring)
    const reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0xFFFFFF, opacity: 0.8, transparent: true })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    // State Variables
    let currentMode = 'place'; // 'place' or 'select'
    let modelScale = 0.05;
    
    const loader = new GLTFLoader();
    let phaseEntries = [];
    let phaseManifestData = null;
    let dataMapData = null;
    let hitTestSource = null;
    let hitTestSourceRequested = false;

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let outlineObject = null; // Store current outline

    // --- 4. LOAD CONTENT ---
    function loadGLB(url) {
      return new Promise((resolve, reject) => {
        loader.load(url, gltf => resolve(gltf), undefined, err => reject(err));
      });
    }

    loadProjectManifest(modelID).then(async (manifest) => {
      if (!manifest) return;
      document.getElementById('tree-container').innerHTML = ''; // Clear loading
      phaseManifestData = manifest;

      // Load Data Map
      try {
        const res = await fetch(paths.dataMap);
        if (res.ok) dataMapData = await res.json();
      } catch(e) { console.warn("No data map found"); }

      // Sort phases
      const sortedPhases = Object.keys(manifest).sort((a, b) => {
        const numA = parseInt(a.match(/\d+/)[0] || 0);
        const numB = parseInt(b.match(/\d+/)[0] || 0);
        return numA - numB;
      });

      phaseEntries = [];
      for (let i = 0; i < sortedPhases.length; i++) {
        const phaseName = sortedPhases[i];
        const url = paths.getGLBPath(phaseName);
        
        try {
          const gltf = await loadGLB(url);
          const model = gltf.scene;
          
          model.scale.set(modelScale, modelScale, modelScale);
          modelGroup.add(model);
          
          phaseEntries.push({ name: phaseName, model });
          
          // Add to Hierarchy UI
          addHierarchyItem(phaseName, model);

        } catch (e) { console.error("Load failed", url, e); }
      }
      
      setupSlider();
    });

    // --- 5. UI LOGIC ---
    
    // Sidebar Toggles
    const sidebar = document.getElementById('sidebar');
    const toggleSidebar = () => sidebar.classList.toggle('open');
    document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
    document.getElementById('sidebar-close').addEventListener('click', () => sidebar.classList.remove('open'));

    // Data Panel
    const dataPanel = document.getElementById('data-panel');
    const closeData = () => {
        dataPanel.classList.remove('active');
        clearOutline();
    };
    document.getElementById('close-data').addEventListener('click', closeData);

    // Mode Switcher
    const btnPlace = document.getElementById('btn-place');
    const btnSelect = document.getElementById('btn-select');
    
    function setMode(mode) {
        currentMode = mode;
        const cursorEl = document.getElementById('select-cursor');
        if(mode === 'place') {
            btnPlace.classList.add('active');
            btnSelect.classList.remove('active');
            reticle.visible = false; // Will be managed by render loop
            if (cursorEl) cursorEl.style.display = 'none';
            clearHover();
        } else {
            btnSelect.classList.add('active');
            btnPlace.classList.remove('active');
            reticle.visible = false; // Hide reticle in select mode
            if (cursorEl) {
                cursorEl.style.display = 'block';
                cursorEl.style.left = (window.innerWidth / 2 - 8) + 'px';
                cursorEl.style.top = (window.innerHeight / 2 - 8) + 'px';
            }
        }
    }
    
    btnPlace.addEventListener('click', () => setMode('place'));
    btnSelect.addEventListener('click', () => setMode('select'));

    // Scale Slider
    const scaleSlider = document.getElementById('scale-slider');
    scaleSlider.addEventListener('input', (e) => {
        modelScale = parseFloat(e.target.value);
        modelGroup.children.forEach(child => {
            child.scale.set(modelScale, modelScale, modelScale);
        });
    });

    // Phasing Slider
    function setupSlider() {
      const slider = document.getElementById('phase-slider');
      const label = document.getElementById('phase-label');
      slider.max = Math.max(0, phaseEntries.length - 1);
      slider.value = phaseEntries.length - 1;
      label.textContent = `${phaseEntries.length}/${phaseEntries.length}`;

      slider.addEventListener('input', (e) => {
          const idx = parseInt(e.target.value);
          phaseEntries.forEach((entry, i) => {
              entry.model.visible = i <= idx;
          });
          label.textContent = `${idx + 1}/${phaseEntries.length}`;
      });
      // Initial Apply
      phaseEntries.forEach((entry, i) => entry.model.visible = true);
    }

    // Hierarchy Builder
    function addHierarchyItem(name, object) {
        const container = document.getElementById('tree-container');
        
        // Parent Item (Phase)
        const div = document.createElement('div');
        div.className = 'tree-item';
        div.innerHTML = `<span class="tree-icon">📁</span> ${name}`;
        div.addEventListener('click', () => selectObject(object, name)); // Select entire phase group
        container.appendChild(div);

        // Children (Meshes) - Flattened slightly for mobile readable
        object.traverse((child) => {
            if (child.isMesh) {
                const childDiv = document.createElement('div');
                childDiv.className = 'tree-item';
                childDiv.style.paddingLeft = '40px'; // Indent
                // Truncate long names
                const shortName = child.name.length > 25 ? child.name.substring(0, 22) + '...' : child.name;
                childDiv.innerHTML = `<span class="tree-icon">🔷</span> ${shortName}`;
                
                childDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectObject(child, child.name);
                    sidebar.classList.remove('open'); // Close sidebar on selection for better mobile UX
                });
                container.appendChild(childDiv);
            }
        });
    }


    // --- 6. INTERACTION LOGIC ---

    const controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);

    function onSelect() {
        if (currentMode === 'place' && reticle.visible) {
            // MOVE MODEL TO RETICLE
            modelGroup.position.setFromMatrixPosition(reticle.matrix);
            modelGroup.quaternion.setFromRotationMatrix(reticle.matrix);
            return;
        }
        if (currentMode === 'select') {
            // Raycast forward from controller
            const tempMatrix = new THREE.Matrix4();
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
            const intersects = raycaster.intersectObjects(modelGroup.children, true);
            if (intersects.length > 0) {
                const hit = intersects.find(x => x.object.isMesh);
                if (hit) {
                    selectObject(hit.object, hit.object.name);
                    sidebar.classList.remove('open');
                }
            } else {
                closeData();
            }
        }
    }

    // Touch Listener for Selection (DOM Overlay)
    container.addEventListener('click', (event) => {
        if (currentMode !== 'select') return;
        
        // Ignore clicks on UI
        if (event.target.closest('#sidebar') || 
            event.target.closest('#data-panel') || 
            event.target.closest('#bottom-controls') || 
            event.target.closest('#top-bar')) return;

        // Normalized Device Coords
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        
        // Intersect
        const intersects = raycaster.intersectObjects(modelGroup.children, true);
        
        if (intersects.length > 0) {
            const hit = intersects.find(x => x.object.isMesh);
            if(hit) {
                selectObject(hit.object, hit.object.name);
                sidebar.classList.remove('open');
            }
        } else {
            closeData();
        }
    });

    // Hover / cursor feedback for select mode
    let hoveredObject = null;
    let hoverOutline = null;

    function clearHover() {
        if (hoverOutline) {
            if (hoverOutline.parent) hoverOutline.parent.remove(hoverOutline);
            hoverOutline = null;
        }
        hoveredObject = null;
        const cursorEl = document.getElementById('select-cursor');
        if (cursorEl) cursorEl.classList.remove('hit');
    }

    container.addEventListener('pointermove', (event) => {
        if (currentMode !== 'select') return;
        const cursorEl = document.getElementById('select-cursor');
        if (!cursorEl) return;

        // Hide cursor over UI
        if (event.target.closest('#sidebar') || event.target.closest('#data-panel') || event.target.closest('#bottom-controls') || event.target.closest('#top-bar')) {
            cursorEl.style.display = 'none';
            clearHover();
            return;
        }
        cursorEl.style.display = 'block';
        cursorEl.style.left = (event.clientX - 8) + 'px';
        cursorEl.style.top = (event.clientY - 8) + 'px';

        // Raycast to detect hover
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(modelGroup.children, true);

        if (intersects.length > 0) {
            const hit = intersects.find(x => x.object.isMesh);
            if (hit) {
                if (hoveredObject !== hit.object) {
                    clearHover();
                    hoveredObject = hit.object;
                    // Create thin edge outline (matches model-view/marker visuals)
                    if (hoveredObject.geometry) {
                        const edges = new THREE.EdgesGeometry(hoveredObject.geometry, 15);
                        const line = new THREE.LineSegments(
                            edges,
                            new THREE.LineBasicMaterial({ color: 0x0099ff, depthTest: false })
                        );
                        line.renderOrder = 998;
                        hoveredObject.add(line);
                        hoverOutline = line;
                    }
                }
                cursorEl.classList.add('hit');
                return;
            }
        }
        // No hit
        clearHover();
    });

    // Ensure hover cleared when leaving select mode or clicking UI
    document.addEventListener('pointerdown', (e) => {
        if (currentMode !== 'select') return;
        if (e.target.closest('#sidebar') || e.target.closest('#data-panel') || e.target.closest('#bottom-controls') || e.target.closest('#top-bar')) {
            clearHover();
        }
    });

    function selectObject(object, name) {
        sidebar.classList.remove('open');
        clearOutline();
        if(object.isMesh) addOutline(object);

        const title = document.getElementById('data-title');
        const content = document.getElementById('data-content');
        
        title.textContent = name || object.name;
        dataPanel.classList.add('active');

        let html = '';
        
        // 1. Mesh Info
        html += `<div class="data-row">
            <div class="data-label">Type</div>
            <div class="data-value">${object.isMesh ? 'Static Mesh' : 'Group/Actor'}</div>
        </div>`;

        // 2. BIM Data from JSON
        if (dataMapData && dataMapData[object.name]) {
             for (const [key, val] of Object.entries(dataMapData[object.name])) {
                html += `<div class="data-row">
                    <div class="data-label">${key}</div>
                    <div class="data-value">${val}</div>
                </div>`;
            }
        } else {
            html += `<div style="padding:10px 0; color:#888; font-style:italic;">No additional BIM data found for this element.</div>`;
        }

        content.innerHTML = html;
    }

    function addOutline(mesh) {
        if (!mesh.isMesh) return;
        // Use edge geometry for a tight mesh outline (same as model-view/marker)
        const edges = new THREE.EdgesGeometry(mesh.geometry, 15);
        const outlineLineMaterial = new THREE.LineBasicMaterial({
            color: 0x0099ff,
            fog: false,
            transparent: true,
            opacity: 1.0,
            depthTest: false,
            depthWrite: false
        });
        const outlineEdges = new THREE.LineSegments(edges, outlineLineMaterial);
        outlineEdges.renderOrder = 999;
        mesh.add(outlineEdges);
        outlineObject = outlineEdges;
    }

    function clearOutline() {
        if (outlineObject) {
            scene.remove(outlineObject);
            outlineObject = null;
        }
    }


    // --- 7. RENDER LOOP ---
    renderer.setAnimationLoop((timestamp, frame) => {
        if (frame) {
            const referenceSpace = renderer.xr.getReferenceSpace();
            const session = renderer.xr.getSession();

            if (hitTestSourceRequested === false) {
                session.requestReferenceSpace('viewer').then((refSpace) => {
                    session.requestHitTestSource({ space: refSpace }).then((source) => {
                        hitTestSource = source;
                    });
                });
                session.addEventListener('end', () => {
                    hitTestSourceRequested = false;
                    hitTestSource = null;
                });
                hitTestSourceRequested = true;
            }

            if (hitTestSource && currentMode === 'place') {
                const hitTestResults = frame.getHitTestResults(hitTestSource);
                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    reticle.visible = true;
                    reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                } else {
                    reticle.visible = false;
                }
            } else {
                reticle.visible = false;
            }
        }
        renderer.render(scene, camera);
    });

  </script>
</body>
</html>
