<!doctype html>
<html lang="en">
    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<style>
.google-sans-flex-normal {
  font-family: "Google Sans Flex", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-variation-settings:
    "slnt" 0,
    "wdth" 100,
    "GRAD" 0,
    "ROND" 0;
}
</style>

<head>
    <title>Project Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: "Google Sans Flex"; background: #1a1a1a; color: white; padding: 20px; }
        .project-card {
            background: #333; padding: 20px; margin-bottom: 15px;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .btn {
            font-family: "Google Sans Flex";
            background: #00D2FF; color: black; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body class="google-sans-flex-normal">
    <h1>
        Test Models
    </h1>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;">
        <div style="color:#aaa; font-size:14px">Auto-generated from <code>models.json</code></div>
        <button onclick="refreshPage()" id="refresh-btn" class="btn" style="background: #ffffff;">Refresh</button>
    </div>

    <div id="models-list"></div>

    <script>
        async function fetchModels() {
            try {
                const res = await fetch('models.json', { cache: 'no-store' });
                if (!res.ok) throw new Error('Failed to fetch models.json');
                const models = await res.json();
                renderModels(models);
            } catch (e) {
                document.getElementById('models-list').innerHTML = `<div style="color:#f88">Error loading models: ${e.message}</div>`;
                console.error(e);
            }
        }

        function renderModels(models) {
            const container = document.getElementById('models-list');
            container.innerHTML = '';
            if (!models || !models.length) {
                container.innerHTML = '<div style="color:#aaa">No models found.</div>';
                return;
            }
            models.forEach(m => {
                const card = document.createElement('div');
                card.className = 'project-card';
                const title = document.createElement('div');
                title.innerHTML = `<h2>${m.name || m.id}</h2>`;
                const link = document.createElement('a');
                link.className = 'btn';
                link.href = `test_pages/model-view.html?id=${encodeURIComponent(m.id)}`;
                link.textContent = 'Open Inspector';
                card.appendChild(title);
                card.appendChild(link);
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('refresh-btn').addEventListener('click', fetchModels);
            fetchModels();
        });
        
        function refreshPage() {
            window.location.reload();
        }
    </script>
</body>
</html>
